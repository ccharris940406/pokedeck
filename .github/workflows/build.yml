name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build
        run: |
          xcodebuild build \
            -project Pokedeck.xcodeproj \
            -scheme Pokedeck \
            -destination "platform=iOS Simulator,name=iPhone 16" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO
